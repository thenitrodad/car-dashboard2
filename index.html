<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>RoadGlow</title>

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#0c1d33;
  color:white;
  overflow:hidden;
}

.shell {
  display:grid;
  grid-template-columns:80px 1fr;
  height:100vh;
}

.sidebar {
  background:#0b1626;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:10px;
  gap:12px;
}

.nav-btn {
  background:rgba(255,255,255,0.05);
  border:none;
  border-radius:20px;
  padding:12px;
  color:white;
  width:100%;
  cursor:pointer;
}

.main {
  position:relative;
}

/* MAP */
#map {
  position:absolute;
  inset:0;
}

/* SEARCH */
.search-panel {
  position:absolute;
  top:80px;
  left:96px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(20px);
  padding:20px;
  border-radius:20px;
  z-index:5;
  width:300px;
}

.search-row {
  display:flex;
  gap:10px;
}

input {
  flex:1;
  padding:12px;
  border-radius:15px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

button.go {
  background:#7be8ff;
  border:none;
  padding:12px;
  border-radius:50%;
}

/* MUSIC BUTTONS */
.button-row {
  position:absolute;
  bottom:40px;
  right:40px;
  display:flex;
  gap:12px;
}

.media-btn {
  width:60px;
  height:60px;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

.media-btn.main {
  width:80px;
  height:80px;
  background:#7be8ff;
  color:black;
}
</style>
</head>

<body>

<div class="shell">

<!-- SIDEBAR -->
<div class="sidebar">

<div>
<svg width="30" height="30" viewBox="0 0 64 64" fill="none">
<rect x="10" y="28" width="44" height="16" rx="4" fill="white"/>
<circle cx="20" cy="46" r="5" fill="#7be8ff"/>
<circle cx="44" cy="46" r="5" fill="#7be8ff"/>
</svg>
</div>

<button class="nav-btn">Map</button>
<button class="nav-btn">Music</button>
<button class="nav-btn">Calls</button>
<button class="nav-btn">Weather</button>

</div>

<!-- MAIN -->
<div class="main">

<div id="map"></div>

<!-- SEARCH -->
<div class="search-panel">
<div>Where to?</div>

<div class="search-row">
<input id="destinationInput" placeholder="Enter destination"/>
<button class="go" onclick="goDestination()">Go</button>
</div>
</div>

<!-- MUSIC -->
<div class="button-row">
<div class="media-btn">⏮</div>
<div class="media-btn main" id="playBtn" onclick="togglePlay()">⏸</div>
<div class="media-btn">⏭</div>
</div>

</div>

</div>

<script>
let map;
let marker;
let playing = true;

function initMap() {
  const start = { lat: 44.3148, lng: -85.6024 };

  map = new google.maps.Map(document.getElementById("map"), {
    center: start,
    zoom: 7,
    disableDefaultUI: true,
    zoomControl: true,
    gestureHandling: "greedy"
  });

  marker = new google.maps.Marker({
    position: start,
    map: map
  });
}

function goDestination() {
  const value = document.getElementById("destinationInput").value;

  if (!value) return;

  const geocoder = new google.maps.Geocoder();

  geocoder.geocode({ address: value }, (results, status) => {
    if (status === "OK") {
      const loc = results[0].geometry.location;
      map.panTo(loc);
      map.setZoom(13);
      marker.setPosition(loc);
    }
  });
}

function togglePlay() {
  playing = !playing;
  document.getElementById("playBtn").innerText = playing ? "⏸" : "▶";
}
</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCoCxyWxvlNTV-AHCaLg2CXxeqFGr-8mEI&callback=initMap">
</script>

</body>
</html>
