<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RoadGlow</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0b1420;
  color: white;
  overflow: hidden;
}

.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  bottom: 0;
  width: 90px;
  background: #0b1420;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 10px;
  gap: 12px;
}

.nav-btn {
  width: 70px;
  height: 70px;
  border-radius: 20px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: white;
}

#map {
  position: fixed;
  top: 0;
  left: 90px;
  right: 0;
  bottom: 0;
}

.search-panel {
  position: fixed;
  top: 12px;
  left: 110px;
  width: 240px;
  z-index: 100;
  padding: 10px;
  border-radius: 16px;
  background: rgba(40,60,70,0.6);
}

.search-row {
  display: flex;
  gap: 8px;
}

.search-row input {
  flex: 1;
  border-radius: 12px;
  border: none;
  padding: 10px;
}

.search-btn {
  width: 50px;
  border-radius: 50%;
  border: none;
  background: #7be8ff;
}

.route-panel {
  position: fixed;
  bottom: 20px;
  left: 110px;
  background: rgba(40,60,70,0.7);
  padding: 12px;
  border-radius: 16px;
  display: none;
}

.clock-screen {
  position: fixed;
  top: 0;
  left: 90px;
  right: 0;
  bottom: 0;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.clock-time {
  font-size: 90px;
}
</style>
</head>

<body>

<div class="sidebar">
  <button class="nav-btn" onclick="setView('map')">Map</button>
  <button class="nav-btn" onclick="openCalls()">Calls</button>
  <button class="nav-btn" onclick="openMessages()">Messages</button>
  <button class="nav-btn" onclick="setView('clock')">Clock</button>
</div>

<div id="map"></div>

<div class="search-panel">
  <div>Where to?</div>
  <div class="search-row">
    <input id="destinationInput" placeholder="Enter destination"/>
    <button class="search-btn" onclick="goDestination()">Go</button>
  </div>
</div>

<div class="route-panel" id="routePanel">
  <div id="routeBanner">Route ready</div>
</div>

<div class="clock-screen" id="clockView">
  <div class="clock-time" id="clockLarge"></div>
</div>

<script>
let map, directionsService, directionsRenderer;

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 44.3, lng: -85.6 },
    zoom: 7,
    disableDefaultUI: true,
    gestureHandling: "greedy"
  });

  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer();
  directionsRenderer.setMap(map);
}

function goDestination() {
  const dest = document.getElementById("destinationInput").value;

  navigator.geolocation.getCurrentPosition(pos => {
    const origin = {
      lat: pos.coords.latitude,
      lng: pos.coords.longitude
    };

    directionsService.route({
      origin,
      destination: dest,
      travelMode: "DRIVING"
    }, (result, status) => {
      if (status === "OK") {
        directionsRenderer.setDirections(result);

        const step = result.routes[0].legs[0].steps[0];
        document.getElementById("routeBanner").innerText =
          step.instructions.replace(/<[^>]+>/g, "") +
          " in " + step.distance.text;

        document.getElementById("routePanel").style.display = "block";
      }
    });
  });
}

function openCalls() {
  window.location.href = "tel:";
}

function openMessages() {
  window.location.href = "sms:";
}

function setView(view) {
  document.getElementById("clockView").style.display =
    view === "clock" ? "flex" : "none";
}

function updateClock() {
  const now = new Date();
  document.getElementById("clockLarge").innerText =
    now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

setInterval(updateClock, 1000);
updateClock();
</script>

<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCoCxyWxvlNTV-AHCaLg2CXxeqFGr-8mEI&callback=initMap"></script>

</body>
</html>
