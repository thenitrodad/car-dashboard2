<!DOCTYPE html>
<html>
<body>
<div id="map" style="height:100vh;"></div>

<script>
function initMap() {
  new google.maps.Map(document.getElementById("map"), {
    center: { lat: 40, lng: -100 },
    zoom: 4
  });
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCoCxyWxvlNTV-AHCaLg2CXxeqFGr-8mEI&callback=initMap" async defer></script>

</body>
</html>
