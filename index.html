<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>RoadGlow Dashboard</title>
  <style>
    :root {
      --bg1: #020613;
      --bg2: #09162c;
      --line: rgba(255,255,255,0.10);
      --text: #f5fbff;
      --muted: rgba(245,251,255,0.62);
      --accent: #73e7ff;
      --accent2: #9f7cff;
      --shadow: 0 24px 80px rgba(0,0,0,0.42);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(115,231,255,0.18), transparent 26%),
        radial-gradient(circle at bottom right, rgba(159,124,255,0.16), transparent 24%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      color: var(--text);
    }

    .app {
      height: 100vh;
      padding: 14px;
    }

    .shell {
      height: 100%;
      display: grid;
      grid-template-columns: 94px 1fr;
      gap: 14px;
    }

    .sidebar {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      border-radius: 32px;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      backdrop-filter: blur(22px);
      box-shadow: var(--shadow);
    }

    .brand {
      width: 100%;
      display: grid;
      place-items: center;
      padding: 8px 0 2px;
    }

    .brand-badge {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 24px;
      background: linear-gradient(135deg, rgba(115,231,255,0.28), rgba(159,124,255,0.22));
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .nav {
      display: grid;
      gap: 10px;
    }

    .nav-btn {
      border: none;
      width: 100%;
      border-radius: 26px;
      padding: 12px 6px;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      display: grid;
      justify-items: center;
      gap: 7px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, background .2s ease, color .2s ease;
    }

    .nav-btn:active {
      transform: scale(.97);
    }

    .nav-btn.active {
      background: linear-gradient(180deg, #fafdff, #dceff8);
      color: #09121c;
      box-shadow: 0 12px 30px rgba(255,255,255,0.16);
    }

    .nav-icon {
      font-size: 22px;
      line-height: 1;
    }

    .main {
      min-width: 0;
      position: relative;
      overflow: hidden;
      border-radius: 36px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      background:
        radial-gradient(circle at 15% 20%, rgba(115,231,255,0.14), transparent 22%),
        radial-gradient(circle at 82% 18%, rgba(159,124,255,0.12), transparent 18%),
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      backdrop-filter: blur(24px);
    }

    .map-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(19,39,70,0.96), rgba(5,10,18,0.96));
    }

    .map-layer iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      filter: saturate(1.05) contrast(1.02);
    }

    .panel {
      position: absolute;
      border: 1px solid var(--line);
      background: rgba(6,12,22,0.58);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
      border-radius: 28px;
      color: var(--text);
    }

    .topbar {
      top: 16px;
      left: 16px;
      right: 16px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      z-index: 3;
    }

    .title-wrap {
      min-width: 0;
    }

    .eyebrow {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill, .icon-btn, .action-btn {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.07);
      color: var(--text);
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
    }

    .pill {
      padding: 10px 14px;
      font-size: 14px;
    }

    .icon-btn {
      width: 52px;
      height: 52px;
      font-size: 22px;
    }

    .action-btn {
      padding: 12px 18px;
      font-size: 16px;
    }

    .action-btn.primary {
      background: linear-gradient(90deg, var(--accent), #ddfbff);
      color: #08121b;
      border: none;
    }

    .search-panel {
      left: 16px;
      top: 106px;
      width: 380px;
      padding: 16px;
      z-index: 3;
    }

    .search-row {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .search-row input {
      flex: 1;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 16px;
      outline: none;
    }

    .search-row input::placeholder {
      color: rgba(245,251,255,0.42);
    }

    .route-card {
      left: 16px;
      bottom: 16px;
      width: 420px;
      padding: 18px;
      z-index: 3;
    }

    .route-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .route-banner {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), #abf5ff);
      color: #061019;
      font-weight: 800;
      box-shadow: 0 12px 30px rgba(115,231,255,0.24);
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .meta {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 12px;
    }

    .meta .label {
      color: var(--muted);
      font-size: 12px;
    }

    .meta .value {
      font-size: 20px;
      font-weight: 800;
      margin-top: 4px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .media-panel {
      right: 16px;
      bottom: 16px;
      width: 340px;
      padding: 18px;
      z-index: 3;
    }

    .album {
      height: 132px;
      border-radius: 24px;
      margin: 12px 0 14px;
      border: 1px solid rgba(255,255,255,0.10);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.16), transparent 28%),
        linear-gradient(135deg, rgba(255,80,176,0.34), rgba(115,231,255,0.22), rgba(159,124,255,0.22));
    }

    .progress {
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.08);
      margin-bottom: 14px;
    }

    .progress > div {
      width: 56%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #fff);
      border-radius: inherit;
    }

    .control-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mini-btn {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border-radius: 18px;
      padding: 12px 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .mini-btn.primary {
      background: linear-gradient(90deg, var(--accent), #dbfbff);
      color: #08111b;
      border: none;
    }

    .status-panel {
      right: 16px;
      top: 106px;
      width: 250px;
      padding: 16px;
      z-index: 3;
    }

    .status-grid {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      font-size: 15px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: .25s ease;
      padding: 14px 18px;
      border-radius: 999px;
      background: rgba(7,12,22,0.88);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      z-index: 10;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 1100px) {
      .search-panel, .route-card, .media-panel, .status-panel {
        width: auto;
        max-width: calc(100% - 32px);
      }

      .title {
        font-size: 22px;
      }

      .shell {
        grid-template-columns: 86px 1fr;
      }
    }

    @media (max-width: 880px) {
      .app {
        padding: 10px;
      }

      .shell {
        grid-template-columns: 78px 1fr;
        gap: 10px;
      }

      .topbar {
        left: 10px;
        right: 10px;
        top: 10px;
      }

      .search-panel {
        left: 10px;
        top: 98px;
        width: 300px;
      }

      .status-panel {
        right: 10px;
        top: 98px;
        width: 200px;
      }

      .route-card {
        left: 10px;
        bottom: 10px;
        width: 320px;
      }

      .media-panel {
        right: 10px;
        bottom: 10px;
        width: 280px;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }

      .brand-badge {
        width: 46px;
        height: 46px;
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <aside class="sidebar">
        <div>
          <div class="brand">
            <div class="brand-badge">🚗</div>
          </div>

          <div class="nav">
            <button class="nav-btn active" onclick="showToast('Home dashboard')">
              <div class="nav-icon">🏠</div>
              <div>Home</div>
            </button>

            <button class="nav-btn" onclick="setMapQuery('Coffee near me')">
              <div class="nav-icon">🗺️</div>
              <div>Maps</div>
            </button>

            <button class="nav-btn" onclick="showToast('Media controls stay in this dashboard')">
              <div class="nav-icon">🎵</div>
              <div>Music</div>
            </button>

            <button class="nav-btn" onclick="showToast('Calling screen can be added here')">
              <div class="nav-icon">📞</div>
              <div>Calls</div>
            </button>

            <button class="nav-btn" onclick="showToast('Vehicle widgets can live here')">
              <div class="nav-icon">🚙</div>
              <div>Car</div>
            </button>

            <button class="nav-btn" onclick="toggleMode()">
              <div class="nav-icon">🌙</div>
              <div>Mode</div>
            </button>
          </div>
        </div>

        <div style="text-align:center; color:var(--muted); font-size:11px; padding:4px 2px 2px;">
          One screen landscape
        </div>
      </aside>

      <main class="main">
        <div class="map-layer">
          <iframe
            id="mapFrame"
            loading="lazy"
            allowfullscreen
            referrerpolicy="no-referrer-when-downgrade"
            src="https://www.google.com/maps?q=Coffee%20near%20me&output=embed">
          </iframe>
        </div>

        <div class="panel topbar">
          <div class="title-wrap">
            <div class="eyebrow">RoadGlow live view</div>
            <div class="title">Scenic drive dashboard</div>
          </div>

          <div class="top-right">
            <div class="pill">🕒 <span id="clock">3:45 PM</span></div>
            <button class="icon-btn" onclick="toggleMode()">☼</button>
          </div>
        </div>

        <div class="panel search-panel">
          <div class="eyebrow">Destination</div>
          <div style="font-size:20px; font-weight:800;">Where to?</div>

          <div class="search-row">
            <input id="destinationInput" value="Coffee near me" placeholder="Search destination" />
            <button class="action-btn primary" onclick="goDestination()">Go</button>
          </div>
        </div>

        <div class="panel status-panel">
          <div class="eyebrow">Drive status</div>

          <div class="status-grid">
            <div class="status-item"><span>Weather</span><strong>72° clear</strong></div>
            <div class="status-item"><span>Battery</span><strong>91%</strong></div>
            <div class="status-item"><span>Traffic</span><strong>Light</strong></div>
            <div class="status-item"><span>Signal</span><strong>Strong</strong></div>
          </div>
        </div>

        <div class="panel route-card">
          <div class="route-top">
            <div>
              <div class="eyebrow">Current route</div>
              <div style="font-size:26px; font-weight:800;">Downtown route</div>
            </div>

            <div class="route-banner">➡ Right in 600 ft</div>
          </div>

          <div class="meta-grid">
            <div class="meta">
              <div class="label">ETA</div>
              <div class="value">4:22 PM</div>
            </div>
            <div class="meta">
              <div class="label">Time</div>
              <div class="value">18 min</div>
            </div>
            <div class="meta">
              <div class="label">Distance</div>
              <div class="value">8.4 mi</div>
            </div>
          </div>

          <div class="actions">
            <button class="action-btn primary" onclick="goDestination()">Update Map</button>
            <button class="action-btn" onclick="setMapQuery('Gas station near me')">Gas</button>
            <button class="action-btn" onclick="setMapQuery('Home')">Home</button>
          </div>
        </div>

        <div class="panel media-panel">
          <div class="eyebrow">Now playing</div>
          <div style="font-size:22px; font-weight:800;">Night Drive</div>
          <div style="color:var(--muted); margin-top:4px;">The Midnight Coast</div>

          <div class="album"></div>

          <div class="progress"><div></div></div>

          <div class="control-row">
            <button class="mini-btn" onclick="showToast('Previous track')">⏮</button>
            <button class="mini-btn primary" onclick="togglePlay()" id="playBtn">⏸ Pause</button>
            <button class="mini-btn" onclick="showToast('Next track')">⏭</button>
            <button class="mini-btn" onclick="showToast('Music stays inside this dashboard mockup')">Open</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const clock = document.getElementById('clock');
    const toast = document.getElementById('toast');
    const playBtn = document.getElementById('playBtn');
    const mapFrame = document.getElementById('mapFrame');
    const destinationInput = document.getElementById('destinationInput');

    let playing = true;
    let dayMode = false;

    function updateClock() {
      const now = new Date();
      clock.textContent = now.toLocaleTimeString([], {
        hour: 'numeric',
        minute: '2-digit'
      });
    }

    updateClock();
    setInterval(updateClock, 30000);

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    function setMapQuery(query) {
      const value = query || 'Coffee near me';
      destinationInput.value = value;
      const q = encodeURIComponent(value);
      mapFrame.src = `https://www.google.com/maps?q=${q}&output=embed`;
      showToast(`Map updated: ${value}`);
    }

    function goDestination() {
      const value = destinationInput.value.trim() || 'Coffee near me';
      setMapQuery(value);
    }

    function togglePlay() {
      playing = !playing;
      playBtn.textContent = playing ? '⏸ Pause' : '▶ Play';
      showToast(playing ? 'Playback resumed' : 'Playback paused');
    }

    function toggleMode() {
      dayMode = !dayMode;

      if (dayMode) {
        document.documentElement.style.setProperty('--bg1', '#eef5ff');
        document.documentElement.style.setProperty('--bg2', '#dbe9ff');
        document.documentElement.style.setProperty('--line', 'rgba(14,24,44,0.10)');
        document.documentElement.style.setProperty('--text', '#101a2a');
        document.documentElement.style.setProperty('--muted', 'rgba(16,26,42,0.62)');
        showToast('Day mode on');
      } else {
        document.documentElement.style.setProperty('--bg1', '#020613');
        document.documentElement.style.setProperty('--bg2', '#09162c');
        document.documentElement.style.setProperty('--line', 'rgba(255,255,255,0.10)');
        document.documentElement.style.setProperty('--text', '#f5fbff');
        document.documentElement.style.setProperty('--muted', 'rgba(245,251,255,0.62)');
        showToast('Night mode on');
      }
    }
  </script>
</body>
</html>
